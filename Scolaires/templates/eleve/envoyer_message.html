{% extends 'base.html' %}
{% block titre %}Envoyer un message{% endblock %}
{% block contenu %}
<div class="mb-4"><a href="{% url 'eleve_messages' %}" class="text-decoration-none"><i class="bi bi-arrow-left"></i> Retour aux messages</a></div>
<h2 class="fw-bold mb-4">Envoyer un message</h2>
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Destinataire</label>
                        <select name="destinataire" class="form-select" required>
                            <option value="">Choisir...</option>
                            {% for contact in contacts %}
                            <option value="{{ contact.id }}">{{ contact.get_full_name|default:contact.username }} ({% if contact.enseignant %}Enseignant{% elif contact.parent %}Parent{% endif %})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Sujet</label>
                        <input type="text" name="sujet" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea name="contenu" class="form-control" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-send me-2"></i>Envoyer</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
