{% extends 'base.html' %}
{% block titre %}Mot de passe réinitialisé{% endblock %}
{% block contenu_auth %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #8338ec 0%, #3a86ff 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0 text-center">
                    <div class="card-body p-5">
                        <div class="mb-4">
                            <div class="bg-primary bg-opacity-20 rounded-circle d-inline-flex align-items-center justify-content-center mx-auto mb-4 p-4">
                                <i class="bi bi-shield-check text-primary" style="font-size: 3rem;"></i>
                            </div>
                            <h3 class="fw-bold mb-3">Mot de passe réinitialisé !</h3>
                            <p class="text-muted lead mb-4">Votre mot de passe a été mis à jour avec succès. Vous pouvez maintenant vous connecter avec vos nouveaux identifiants.</p>
                        </div>
                        <a href="{% url 'login' %}" class="btn btn-primary btn-lg px-5 py-3 fw-bold">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
