{% extends 'base.html' %}
{% block titre %}Réinitialiser mot de passe{% endblock %}
{% block contenu_auth %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <div class="text-center mb-5">
                            <div class="bg-warning bg-opacity-20 rounded-circle d-inline-flex align-items-center justify-content-center mb-4 p-4">
                                <i class="bi bi-key text-warning" style="font-size: 3rem;"></i>
                            </div>
                            <h3 class="fw-bold mb-2">Mot de passe oublié ?</h3>
                            <p class="text-muted mb-0">Entrez votre adresse email pour recevoir un lien de réinitialisation.</p>
                        </div>
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-4">
                                <label for="{{ form.email.id_for_label }}" class="form-label fw-semibold">Adresse email</label>
                                {{ form.email }}
                            </div>
                            <button type="submit" class="btn btn-warning w-100 py-3 fw-bold fs-5 mb-3">
                                <i class="bi bi-send me-2"></i>Envoyer le lien de réinitialisation
                            </button>
                            <a href="{% url 'login' %}" class="btn btn-outline-secondary w-100 py-2">
                                <i class="bi bi-arrow-left me-2"></i>Retour à la connexion
                            </a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
