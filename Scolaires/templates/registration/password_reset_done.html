{% extends 'base.html' %}
{% block titre %}Email envoyé{% endblock %}
{% block contenu_auth %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #48cae4 0%, #023e8a 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg border-0 text-center">
                    <div class="card-body p-5">
                        <div class="mb-4">
                            <div class="bg-success bg-opacity-20 rounded-circle d-inline-flex align-items-center justify-content-center mx-auto mb-4" style="width:100px;height:100px;">
                                <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
                            </div>
                            <h3 class="fw-bold mb-3">Email envoyé !</h3>
                            <p class="text-muted lead mb-0">Vérifiez votre boîte de réception (et spam). Vous devriez recevoir un lien pour réinitialiser votre mot de passe dans quelques instants.</p>
                        </div>
                        <a href="{% url 'login' %}" class="btn btn-primary btn-lg px-5 py-3 fw-bold">
                            <i class="bi bi-house-door me-2"></i>Retour à la connexion
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
