{% extends 'base.html' %}
{% block titre %}Nouveau devoir{% endblock %}
{% block contenu %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header"><h5 class="mb-0">Nouveau devoir</h5></div>
            <div class="card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Cours</label>
                        <select name="cours" class="form-select" required>
                            <option value="">-- Choisir un cours --</option>
                            {% for c in cours_list %}
                            <option value="{{ c.id }}">{{ c.matiere }} - {{ c.classe }} ({{ c.jour }} {{ c.heure_debut|time:"H:i" }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Titre</label>
                        <input type="text" name="titre" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="4"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date et heure de rendu</label>
                        <input type="datetime-local" name="date_rendu" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fichier de consigne</label>
                        <input type="file" name="fichier_attache" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary">Créer le devoir</button>
                    <a href="{% url 'enseignant_devoirs_liste' %}" class="btn btn-outline-secondary">Annuler</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
