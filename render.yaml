services:
  - type: web
    name: gestion-scolaires
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn Scolaires.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
    healthcheck:
      path: /
      protocol: http
      interval: 10
      timeout: 5
      initialDelay: 10
